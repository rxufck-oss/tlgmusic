<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Music</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: var(--tg-theme-bg-color, #0a0a0a);
      --bg-secondary: var(--tg-theme-secondary-bg-color, #1a1a1a);
      --text-primary: var(--tg-theme-text-color, #ffffff);
      --text-secondary: var(--tg-theme-hint-color, #8e8e93);
      --accent: var(--tg-theme-button-color, #007aff);
      --accent-hover: #0056b3;
      --border: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow-x: hidden;
      padding-bottom: 48px;
    }

    .search-container {
      position: sticky;
      top: 0;
      background: var(--bg-primary);
      backdrop-filter: blur(20px);
      z-index: 100;
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .search-wrapper {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 20px;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 17px;
      color: var(--text-primary);
      transition: all 0.3s ease;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
    }

    .search-input::placeholder {
      color: var(--text-secondary);
    }

    .section-title {
      padding: 14px 16px 8px;
      font-size: 16px;
      font-weight: 600;
    }

    .new-releases {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 0 16px 12px;
    }

    .release-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px;
      display: grid;
      gap: 8px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .release-card:active {
      transform: scale(0.98);
    }

    .release-cover {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      object-fit: cover;
      background: linear-gradient(135deg, var(--accent) 0%, #764ba2 100%);
    }

    .release-title {
      font-weight: 600;
      font-size: 14px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 36px;
    }

    .release-sub {
      font-size: 12px;
      color: var(--text-secondary);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .release-tag {
      font-size: 11px;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      padding: 4px 8px;
      border-radius: 999px;
      display: inline-block;
      width: fit-content;
    }

    .results {
      padding: 8px 16px;
    }

    .track {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .track::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, var(--accent) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .track:active {
      transform: scale(0.98);
    }

    .track:active::before {
      opacity: 0.05;
    }

    .track-thumbnail {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      object-fit: cover;
      background: linear-gradient(135deg, var(--accent) 0%, #764ba2 100%);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .track-thumbnail.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .track-info {
      flex: 1;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .track-title {
      font-weight: 600;
      font-size: 16px;
      line-height: 1.3;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .track-duration {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .track-play-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.2s ease;
    }

    .track:hover .track-play-icon {
      opacity: 1;
      transform: scale(1);
    }

    .empty {
      text-align: center;
      padding: 80px 40px;
    }

    .empty-icon {
      font-size: 80px;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .empty-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      opacity: 0.9;
    }

    .empty-text {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .loading {
      text-align: center;
      padding: 60px 40px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      margin: 0 auto 20px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: var(--text-secondary);
      font-size: 15px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .track {
      animation: fadeIn 0.3s ease backwards;
    }

    .track:nth-child(1) { animation-delay: 0.05s; }
    .track:nth-child(2) { animation-delay: 0.1s; }
    .track:nth-child(3) { animation-delay: 0.15s; }
    .track:nth-child(4) { animation-delay: 0.2s; }
    .track:nth-child(5) { animation-delay: 0.25s; }

    @media (max-width: 380px) {
      .search-input { font-size: 16px; }
      .track-title { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="search-container">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        class="search-input"
        id="searchInput"
        placeholder="Найти музыку..."
        autocomplete="off"
      />
    </div>
  </div>

  <div class="section-title">Новинки Spotify</div>
  <div class="new-releases" id="newReleases"></div>

  <div class="results" id="results">
    <div class="empty">
      <div class="empty-icon">🎵</div>
      <div class="empty-title">Найдите свою музыку</div>
      <div class="empty-text">Введите название трека или исполнителя</div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.expand();
      tg.enableClosingConfirmation();
    }

    const API_BASE = window.location.origin;
    const SEARCH_URL = `${API_BASE}/api/search`;
    const DOWNLOAD_URL = `${API_BASE}/api/download`;
    const NEW_RELEASES_URL = `${API_BASE}/api/new-releases`;

    const userId = tg?.initDataUnsafe?.user?.id || "demo";

    const searchInput = document.getElementById("searchInput");
    const results = document.getElementById("results");
    const newReleasesEl = document.getElementById("newReleases");

    let playlist = [];
    let searchTimeout = null;

    searchInput.addEventListener("input", (e) => {
      clearTimeout(searchTimeout);
      const query = e.target.value.trim();

      if (!query) {
        showEmpty();
        return;
      }

      searchTimeout = setTimeout(() => searchMusic(query), 400);
    });

    async function searchMusic(query) {
      showLoading();

      try {
        const response = await fetch(SEARCH_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query,
            limit: 30,
            source: "spotify",
            artistMode: false,
            includeMeta: true,
            includeCovers: false
          })
        });

        if (!response.ok) throw new Error("Search failed");

        const data = await response.json();
        playlist = (data.results || []).map(mapTrack);
        displayResults(playlist);
      } catch (error) {
        console.error("Search error:", error);
        showError("Не удалось найти треки");
      }
    }

    function mapTrack(raw) {
      return {
        id: raw.id || raw.url || "",
        title: raw.title || raw.name || "Без названия",
        artist: raw.artist || raw.uploader || "Unknown Artist",
        duration: raw.duration || raw.duration_string || "?:??",
        url: raw.url || raw.webpage_url || "",
        cover: raw.cover_url || raw.thumbnail || "",
        source: raw.source || "spotify"
      };
    }

    function displayResults(tracks) {
      if (!tracks.length) {
        showEmpty("Ничего не найдено");
        return;
      }

      results.innerHTML = tracks.map((track, index) => `
        <div class="track" data-i="${index}">
          ${track.cover ?
            `<img src="${escapeHtml(track.cover)}" class="track-thumbnail" alt="">` :
            `<div class="track-thumbnail placeholder">🎵</div>`
          }
          <div class="track-info">
            <div class="track-title">${escapeHtml(track.title)}</div>
            <div class="track-duration">${escapeHtml(track.artist)} • ${escapeHtml(track.duration)}</div>
          </div>
          <div class="track-play-icon">▶️</div>
        </div>
      `).join("");

      results.querySelectorAll(".track").forEach((el) => {
        el.onclick = () => {
          const idx = Number(el.getAttribute("data-i"));
          sendTrack(playlist[idx]);
        };
      });
    }

    async function sendTrack(track) {
      if (!track?.url) {
        showNotification("Нет ссылки на трек");
        return;
      }
      if (!tg || userId === "demo") {
        showNotification("Откройте TMA внутри Telegram");
        return;
      }

      try {
        const response = await fetch(DOWNLOAD_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            userId,
            chatId: userId,
            title: track.title,
            artist: track.artist,
            trackUrl: track.url,
            url: track.url,
            source: "spotify",
            cover_url: track.cover
          })
        });

        if (!response.ok) throw new Error("Send failed");
        showNotification("MP3 отправлен в чат");
        haptic("success");
      } catch (error) {
        console.error("Send error:", error);
        showNotification("Не удалось отправить MP3");
        haptic("error");
      }
    }

    async function loadNewReleases() {
      try {
        const response = await fetch(`${NEW_RELEASES_URL}?limit=12&country=US`);
        if (!response.ok) throw new Error("New releases failed");
        const data = await response.json();
        const albums = data.albums || [];
        const tracks = data.tracks || [];
        renderNewReleases(albums, tracks);
      } catch (error) {
        console.error("New releases error:", error);
        newReleasesEl.innerHTML = "";
      }
    }

    function renderNewReleases(albums, tracks) {
      const items = [];
      albums.forEach((a) => items.push({
        type: "album",
        title: a.album_name || "Альбом",
        artist: a.artist || "Unknown Artist",
        cover: a.cover_url || "",
        url: a.url || "",
        query: `${a.artist || ""} ${a.album_name || ""}`.trim()
      }));
      tracks.forEach((t) => items.push({
        type: "track",
        title: t.title || "Трек",
        artist: t.artist || "Unknown Artist",
        cover: t.cover_url || "",
        url: t.url || "",
        track: mapTrack(t)
      }));

      newReleasesEl.innerHTML = items.map((item, index) => `
        <div class="release-card" data-i="${index}" data-type="${item.type}">
          ${item.cover ?
            `<img class="release-cover" src="${escapeHtml(item.cover)}" alt="">` :
            `<div class="release-cover"></div>`
          }
          <div class="release-title">${escapeHtml(item.title)}</div>
          <div class="release-sub">${escapeHtml(item.artist)}</div>
          <div class="release-tag">${item.type === "album" ? "Альбом" : "Трек"}</div>
        </div>
      `).join("");

      newReleasesEl.querySelectorAll(".release-card").forEach((el) => {
        el.onclick = () => {
          const idx = Number(el.getAttribute("data-i"));
          const item = items[idx];
          if (!item) return;
          if (item.type === "album") {
            searchInput.value = item.query;
            if (item.query) searchMusic(item.query);
          } else if (item.type === "track") {
            sendTrack(item.track);
          }
        };
      });
    }

    function showLoading() {
      results.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <div class="loading-text">Поиск треков...</div>
        </div>
      `;
    }

    function showEmpty(text = "Введите название трека или исполнителя") {
      results.innerHTML = `
        <div class="empty">
          <div class="empty-icon">🎵</div>
          <div class="empty-title">Найдите свою музыку</div>
          <div class="empty-text">${escapeHtml(text)}</div>
        </div>
      `;
    }

    function showError(text) {
      results.innerHTML = `
        <div class="empty">
          <div class="empty-icon">😕</div>
          <div class="empty-title">Что-то пошло не так</div>
          <div class="empty-text">${escapeHtml(text)}</div>
        </div>
      `;
    }

    function showNotification(text) {
      if (tg?.showAlert) tg.showAlert(text);
      else alert(text);
    }

    function haptic(type) {
      if (!tg?.HapticFeedback) return;
      if (type === "success") tg.HapticFeedback.notificationOccurred("success");
      else if (type === "error") tg.HapticFeedback.notificationOccurred("error");
      else tg.HapticFeedback.impactOccurred("light");
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = String(text ?? "");
      return div.innerHTML;
    }

    loadNewReleases();
    setTimeout(() => searchInput.focus(), 300);
  </script>
</body>
</html>
