<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Music</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: var(--tg-theme-bg-color, #0a0a0a);
      --bg-secondary: var(--tg-theme-secondary-bg-color, #1a1a1a);
      --text-primary: var(--tg-theme-text-color, #ffffff);
      --text-secondary: var(--tg-theme-hint-color, #8e8e93);
      --accent: var(--tg-theme-button-color, #007aff);
      --accent-hover: #0056b3;
      --border: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow-x: hidden;
      padding-bottom: 48px;
    }

    .search-container {
      position: sticky;
      top: 0;
      background: var(--bg-primary);
      backdrop-filter: blur(20px);
      z-index: 100;
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .search-wrapper {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 20px;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 17px;
      color: var(--text-primary);
      transition: all 0.3s ease;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
    }

    .search-input::placeholder {
      color: var(--text-secondary);
    }

    .section-title {
      padding: 14px 16px 8px;
      font-size: 16px;
      font-weight: 600;
    }

    .recent-searches {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 12px;
    }
    .recent-pill {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .artist-card {
      margin: 0 16px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      display: none;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }
    .artist-card img {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      object-fit: cover;
      background: linear-gradient(135deg, var(--accent) 0%, #764ba2 100%);
    }
    .artist-card .artist-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .artist-card .artist-meta {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .artist-group {
      margin-bottom: 14px;
    }
    .artist-title {
      font-size: 14px;
      font-weight: 600;
      padding: 6px 0 8px;
      color: var(--text-primary);
    }
    .artist-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      z-index: 300;
    }
    .artist-modal .panel {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin: 40px 16px;
      max-height: calc(100vh - 80px);
      overflow: auto;
      padding: 16px;
    }
    .artist-modal .close-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      float: right;
    }
    .album-block {
      margin-top: 16px;
    }
    .album-title {
      font-size: 14px;
      font-weight: 600;
      margin: 6px 0 8px;
    }
    .album-cover {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      object-fit: cover;
      margin-right: 10px;
    }
    .album-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .album-meta {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .results {
      padding: 8px 16px;
    }
    .load-more-wrap {
      display: none;
      padding: 8px 16px 24px;
      text-align: center;
    }
    .load-more-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    .artist-modal .load-more-wrap {
      padding: 4px 0 12px;
    }

    .spotify-card {
      margin: 8px 16px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
    }

    .spotify-title {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .spotify-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .spotify-btn {
      background: #1b1b1b;
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    .spotify-status {
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .track {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .track::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, var(--accent) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .track:active {
      transform: scale(0.98);
    }

    .track:active::before {
      opacity: 0.05;
    }

    .track-thumbnail {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      object-fit: cover;
      background: linear-gradient(135deg, var(--accent) 0%, #764ba2 100%);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .track-thumbnail.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .track-info {
      flex: 1;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .track-title {
      font-weight: 600;
      font-size: 16px;
      line-height: 1.3;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .track-duration {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .muted {
      color: var(--text-secondary);
      font-size: 13px;
    }

    .track-play-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.2s ease;
    }

    .track:hover .track-play-icon {
      opacity: 1;
      transform: scale(1);
    }

    .empty {
      text-align: center;
      padding: 80px 40px;
    }

    .empty-icon {
      font-size: 80px;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .empty-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      opacity: 0.9;
    }

    .empty-text {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .loading {
      text-align: center;
      padding: 60px 40px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      margin: 0 auto 20px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: var(--text-secondary);
      font-size: 15px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .track {
      animation: fadeIn 0.3s ease backwards;
    }

    .track:nth-child(1) { animation-delay: 0.05s; }
    .track:nth-child(2) { animation-delay: 0.1s; }
    .track:nth-child(3) { animation-delay: 0.15s; }
    .track:nth-child(4) { animation-delay: 0.2s; }
    .track:nth-child(5) { animation-delay: 0.25s; }

    @media (max-width: 380px) {
      .search-input { font-size: 16px; }
      .track-title { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="search-container">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        class="search-input"
        id="searchInput"
        placeholder="Найти музыку..."
        autocomplete="off"
      />
    </div>
  </div>

  <div class="spotify-card" id="spotifyCard">
    <div class="spotify-title">Spotify</div>
    <div class="spotify-actions">
      <button class="spotify-btn" id="spotifyConnectBtn">Подключить</button>
      <button class="spotify-btn" id="spotifyLibraryBtn">Мои треки</button>
    </div>
    <div class="spotify-status" id="spotifyStatus">Не подключен</div>
  </div>

  <div class="section-title">Недавние поиски</div>
  <div class="recent-searches" id="recentSearches"></div>
  <div class="artist-card" id="artistCard"></div>

  <div class="results" id="results">
    <div class="empty">
      <div class="empty-icon">🎵</div>
      <div class="empty-title">Найдите свою музыку</div>
      <div class="empty-text">Введите название трека или исполнителя</div>
    </div>
  </div>
  <div class="load-more-wrap" id="loadMoreWrap">
    <button class="load-more-btn" id="loadMoreBtn">Загрузить еще</button>
  </div>
  <div class="artist-modal" id="artistModal">
    <div class="panel">
      <button class="close-btn" id="artistCloseBtn">Закрыть</button>
      <div id="artistModalBody"></div>
      <div class="load-more-wrap" id="artistLoadMoreWrap">
        <button class="load-more-btn" id="artistLoadMoreBtn">Загрузить еще</button>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.expand();
      tg.enableClosingConfirmation();
    }

    const API_BASE = window.location.origin;
    const SEARCH_URL = `${API_BASE}/api/search`;
    const DOWNLOAD_URL = `${API_BASE}/api/download`;
    const ARTIST_URL = `${API_BASE}/api/artist`;
    const SPOTIFY_ME_URL = `${API_BASE}/api/spotify/me`;
    const SPOTIFY_LIBRARY_URL = `${API_BASE}/api/spotify/library`;

    const userId = tg?.initDataUnsafe?.user?.id || "demo";

    const searchInput = document.getElementById("searchInput");
    const results = document.getElementById("results");
    const recentSearchesEl = document.getElementById("recentSearches");
    const artistCardEl = document.getElementById("artistCard");
    const artistModalEl = document.getElementById("artistModal");
    const artistModalBody = document.getElementById("artistModalBody");
    const artistCloseBtn = document.getElementById("artistCloseBtn");
    const spotifyConnectBtn = document.getElementById("spotifyConnectBtn");
    const spotifyLibraryBtn = document.getElementById("spotifyLibraryBtn");
    const spotifyStatusEl = document.getElementById("spotifyStatus");

    let playlist = [];
    let lastQuery = "";
    let searchAbort = null;
    let searchOffset = 0;
    const PAGE_SIZE = 20;
    const ARTIST_PAGE_SIZE = 20;
    let artistModalTracks = [];
    let artistState = {
      query: "",
      artist: null,
      albums: [],
      offset: 0,
      hasMore: false,
      loading: false
    };
    let spotifyOffset = 0;

    const loadMoreWrap = document.getElementById("loadMoreWrap");
    const loadMoreBtn = document.getElementById("loadMoreBtn");
    const artistLoadMoreWrap = document.getElementById("artistLoadMoreWrap");
    const artistLoadMoreBtn = document.getElementById("artistLoadMoreBtn");

    searchInput.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      const query = e.target.value.trim();
      if (!query || query.length < 2) {
        showEmpty();
        return;
      }
      if (query.toLowerCase() === lastQuery) return;
      searchMusic(query, false);
    });

    async function searchMusic(query, append) {
      if (!append) {
        searchOffset = 0;
        showLoading();
        saveRecentSearch(query);
        renderRecentSearches();
      }

      try {
        lastQuery = query.toLowerCase();
        if (searchAbort) searchAbort.abort();
        searchAbort = new AbortController();
        const response = await fetch(SEARCH_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          signal: searchAbort.signal,
          body: JSON.stringify({
            query,
            limit: PAGE_SIZE,
            offset: searchOffset,
            source: "spotify",
            artistMode: false,
            includeMeta: true,
            includeCovers: true,
            userId
          })
        });

        if (!response.ok) throw new Error("Search failed");

        const data = await response.json();
        if (data?.error) {
          showError(data.error);
          return;
        }
        const incoming = dedupeTracks((data.results || []).map(mapTrack));
        if (!append) {
          playlist = incoming;
        } else {
          playlist = dedupeTracks(playlist.concat(incoming));
        }
        displayResults(playlist);
        if (!append) {
          loadArtistCardFromResults(query, playlist);
        }
        if (incoming.length >= PAGE_SIZE) {
          searchOffset += PAGE_SIZE;
          loadMoreWrap.style.display = "block";
          loadMoreBtn.onclick = () => searchMusic(query, true);
        } else {
          loadMoreWrap.style.display = "none";
        }
      } catch (error) {
        if (error?.name === "AbortError") return;
        console.error("Search error:", error);
        showError("Не удалось найти треки");
      }
    }

    function mapTrack(raw) {
      return {
        id: raw.id || raw.url || "",
        title: raw.title || raw.name || "Без названия",
        artist: raw.artist || raw.uploader || "Unknown Artist",
        duration: raw.duration || raw.duration_string || "?:??",
        url: raw.url || raw.webpage_url || "",
        cover: raw.cover_url || raw.thumbnail || "",
        source: raw.source || "soundcloud"
      };
    }

    function displayResults(tracks) {
      if (!tracks.length) {
        showEmpty("Ничего не найдено");
        loadMoreWrap.style.display = "none";
        return;
      }

      const grouped = groupByArtist(tracks);
      results.innerHTML = Object.keys(grouped).map((artist) => {
        const list = grouped[artist];
        const items = list.map((track) => {
          const idx = playlist.findIndex((p) => p.id === track.id && p.url === track.url);
          return `
            <div class="track" data-i="${idx}">
              ${track.cover ?
                `<img src="${escapeHtml(track.cover)}" class="track-thumbnail" alt="">` :
                `<div class="track-thumbnail placeholder">🎵</div>`
              }
              <div class="track-info">
                <div class="track-title">${escapeHtml(track.title)}</div>
                <div class="track-duration">${escapeHtml(track.duration)}</div>
              </div>
              <div class="track-play-icon">▶️</div>
            </div>
          `;
        }).join("");
        return `
          <div class="artist-group">
            <div class="artist-title">${escapeHtml(artist)}</div>
            ${items}
          </div>
        `;
      }).join("");

      results.querySelectorAll(".track").forEach((el) => {
        el.onclick = () => {
          const idx = Number(el.getAttribute("data-i"));
          if (idx >= 0) sendTrack(playlist[idx]);
        };
      });
    }

    function dedupeTracks(list) {
      const seen = new Set();
      return list.filter((t) => {
        const key = `${(t.artist || "").toLowerCase()}|${(t.title || "").toLowerCase()}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function groupByArtist(tracks) {
      const map = {};
      tracks.forEach((t) => {
        const artist = t.artist || "Unknown Artist";
        if (!map[artist]) map[artist] = [];
        map[artist].push(t);
      });
      return map;
    }

    async function fetchArtistPage(query, offset = 0) {
      const url = `${ARTIST_URL}?query=${encodeURIComponent(query)}&limit=${ARTIST_PAGE_SIZE}&offset=${offset}&source=spotify&userId=${encodeURIComponent(userId)}`;
      const res = await fetch(url);
      if (!res.ok) return null;
      return res.json();
    }

    function dedupeAlbumTracks(tracks) {
      const seen = new Set();
      return (tracks || []).filter((t) => {
        const key = `${(t.title || "").toLowerCase()}|${(t.artist || "").toLowerCase()}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function mergeAlbums(existing, incoming) {
      const map = new Map();
      const order = [];

      (existing || []).forEach((album) => {
        const key = album.id || album.name || "Без альбома";
        map.set(key, {
          ...album,
          tracks: dedupeAlbumTracks(album.tracks || [])
        });
        order.push(key);
      });

      (incoming || []).forEach((album) => {
        const key = album.id || album.name || "Без альбома";
        if (!map.has(key)) {
          map.set(key, {
            ...album,
            tracks: dedupeAlbumTracks(album.tracks || [])
          });
          order.push(key);
          return;
        }
        const current = map.get(key);
        current.tracks = dedupeAlbumTracks((current.tracks || []).concat(album.tracks || []));
        if (!current.cover_url && album.cover_url) current.cover_url = album.cover_url;
        if (!current.release_date && album.release_date) current.release_date = album.release_date;
      });

      return order.map((key) => map.get(key));
    }

    async function loadArtistCard(query) {
      if (!artistCardEl) return;
      artistCardEl.style.display = "none";
      artistState = {
        query,
        artist: null,
        albums: [],
        offset: 0,
        hasMore: false,
        loading: false
      };
      try {
        const data = await fetchArtistPage(query, 0);
        if (!data || !data.ok || !data.artist) {
          artistCardEl.style.display = "none";
          return;
        }
        artistState.artist = data.artist;
        artistState.albums = mergeAlbums([], data.albums || []);
        artistState.offset = data.next_offset || 0;
        artistState.hasMore = !!data.has_more;
        if (!artistState.albums.length) {
          artistCardEl.style.display = "none";
          return;
        }
        renderArtistCard(artistState.artist);
      } catch (e) {
        console.error("Artist card error:", e);
      }
    }

    function loadArtistCardFromResults(query, list) {
      if (!list.length) return;
      const primary = (list[0].artist || "").split(",")[0].trim();
      const artistQuery = primary || query;
      if (!artistQuery) return;
      loadArtistCard(artistQuery);
    }

    function renderArtistCard(artist) {
      if (!artistCardEl) return;
      const genres = (artist.genres || []).slice(0, 2).join(", ");
      const followers = artist.followers ? `${artist.followers.toLocaleString()} слушателей` : "";
      artistCardEl.innerHTML = `
        ${artist.image ? `<img src="${escapeHtml(artist.image)}" alt="">` : `<div class="track-thumbnail placeholder">🎵</div>`}
        <div>
          <div class="artist-name">${escapeHtml(artist.name || "Артист")}</div>
          <div class="artist-meta">${escapeHtml([genres, followers].filter(Boolean).join(" • "))}</div>
        </div>
      `;
      artistCardEl.style.display = "flex";
      artistCardEl.onclick = () => openArtistModal();
    }

    function renderArtistModal() {
      if (!artistModalEl) return;
      const artist = artistState.artist || { name: artistState.query || "Артист", genres: [] };
      const header = `
        <div class="album-header">
          ${artist.image ? `<img class="album-cover" src="${escapeHtml(artist.image)}" alt="">` : `<div class="album-cover"></div>`}
          <div>
            <div class="artist-title">${escapeHtml(artist.name || "Артист")}</div>
            <div class="album-meta">${escapeHtml((artist.genres || []).slice(0, 3).join(", "))}</div>
          </div>
        </div>
      `;
      artistModalTracks = [];
      const albums = artistState.albums || [];
      let body = "";
      if (!albums.length) {
        body = `<div class="empty">Ничего не найдено</div>`;
      } else {
        body = albums.map((album) => {
          const tracks = (album.tracks || []).map((t) => {
            const trackObj = {
              id: t.id || t.url || "",
              title: t.title,
              artist: t.artist,
              duration: t.duration,
              url: t.url,
              cover: album.cover_url,
              source: "soundcloud"
            };
            const idx = artistModalTracks.push(trackObj) - 1;
            return `
              <div class="track" data-i="${idx}">
                <div class="track-info">
                  <div class="track-title">${escapeHtml(t.title)}</div>
                  <div class="track-duration">${escapeHtml(t.duration)}</div>
                </div>
                <div class="track-play-icon">▶️</div>
              </div>
            `;
          }).join("");
          return `
            <div class="album-block">
              <div class="album-header">
                ${album.cover_url ? `<img class="album-cover" src="${escapeHtml(album.cover_url)}" alt="">` : `<div class="album-cover"></div>`}
                <div>
                  <div class="album-title">${escapeHtml(album.name || "Альбом")}</div>
                  <div class="album-meta">${escapeHtml(album.release_date || "")}</div>
                </div>
              </div>
              ${tracks}
            </div>
          `;
        }).join("");
      }
      artistModalBody.innerHTML = header + body;
      artistModalEl.style.display = "block";
      artistModalBody.querySelectorAll(".track").forEach((el) => {
        el.onclick = () => {
          const idx = Number(el.getAttribute("data-i"));
          if (idx >= 0) sendTrack(artistModalTracks[idx]);
        };
      });
      updateArtistLoadMore();
    }

    function updateArtistLoadMore() {
      if (!artistLoadMoreWrap || !artistLoadMoreBtn) return;
      if (!artistState.hasMore) {
        artistLoadMoreWrap.style.display = "none";
        return;
      }
      artistLoadMoreWrap.style.display = "block";
      artistLoadMoreBtn.disabled = artistState.loading;
      artistLoadMoreBtn.textContent = artistState.loading ? "Загрузка..." : "Загрузить еще";
    }

    async function loadArtistMore() {
      if (artistState.loading || !artistState.hasMore || !artistState.query) return;
      artistState.loading = true;
      updateArtistLoadMore();
      try {
        const data = await fetchArtistPage(artistState.query, artistState.offset);
        if (!data || !data.ok) {
          artistState.hasMore = false;
          updateArtistLoadMore();
          return;
        }
        if (data.artist && !artistState.artist) {
          artistState.artist = data.artist;
        }
        artistState.albums = mergeAlbums(artistState.albums || [], data.albums || []);
        artistState.offset = data.next_offset || 0;
        artistState.hasMore = !!data.has_more;
        artistState.loading = false;
        renderArtistModal();
      } catch (e) {
        artistState.loading = false;
        updateArtistLoadMore();
        console.error("Artist load more error:", e);
      }
    }

    function openArtistModal() {
      if (!artistState.artist) return;
      renderArtistModal();
    }

    if (artistCloseBtn) {
      artistCloseBtn.onclick = () => {
        artistModalEl.style.display = "none";
      };
    }

    function loadRecentSearches() {
      try {
        const raw = localStorage.getItem("tlg_recent_searches");
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveRecentSearch(query) {
      const q = query.trim();
      if (!q) return;
      const list = loadRecentSearches().filter((x) => x.toLowerCase() !== q.toLowerCase());
      list.unshift(q);
      const trimmed = list.slice(0, 8);
      localStorage.setItem("tlg_recent_searches", JSON.stringify(trimmed));
    }

    function renderRecentSearches() {
      if (!recentSearchesEl) return;
      const list = loadRecentSearches();
      if (!list.length) {
        recentSearchesEl.innerHTML = `<div class="muted">Нет истории</div>`;
        return;
      }
      recentSearchesEl.innerHTML = list.map((q) => `
        <button class="recent-pill" data-q="${escapeHtml(q)}">${escapeHtml(q)}</button>
      `).join("");
      recentSearchesEl.querySelectorAll(".recent-pill").forEach((btn) => {
        btn.onclick = () => {
          const q = btn.getAttribute("data-q") || "";
          if (!q) return;
          searchInput.value = q;
          searchMusic(q, false);
        };
      });
    }

    async function sendTrack(track) {
      if (!track?.url) {
        showNotification("Нет ссылки на трек");
        return;
      }
      if (!tg || userId === "demo") {
        showNotification("Откройте TMA внутри Telegram");
        return;
      }

      try {
        const response = await fetch(DOWNLOAD_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            userId,
            chatId: userId,
            title: track.title,
            artist: track.artist,
            trackUrl: track.url,
            url: track.url,
            source: track.source || "spotify",
            cover_url: track.cover
          })
        });

        if (!response.ok) throw new Error("Send failed");
        showNotification("MP3 отправлен в чат");
        haptic("success");
      } catch (error) {
        console.error("Send error:", error);
        showNotification("Не удалось отправить MP3");
        haptic("error");
      }
    }

    function showLoading() {
      results.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <div class="loading-text">Поиск треков...</div>
        </div>
      `;
      loadMoreWrap.style.display = "none";
    }

    function showEmpty(text = "Введите название трека или исполнителя") {
      results.innerHTML = `
        <div class="empty">
          <div class="empty-icon">🎵</div>
          <div class="empty-title">Найдите свою музыку</div>
          <div class="empty-text">${escapeHtml(text)}</div>
        </div>
      `;
    }

    function showError(text) {
      results.innerHTML = `
        <div class="empty">
          <div class="empty-icon">😕</div>
          <div class="empty-title">Что-то пошло не так</div>
          <div class="empty-text">${escapeHtml(text)}</div>
        </div>
      `;
    }

    function openSpotifyLogin() {
      const returnUrl = window.location.href;
      const url = `${API_BASE}/spotify/login?userId=${encodeURIComponent(userId)}&return=${encodeURIComponent(returnUrl)}`;
      if (tg?.openLink) tg.openLink(url);
      else window.open(url, "_blank");
    }

    async function refreshSpotifyStatus() {
      if (!spotifyStatusEl) return;
      try {
        const res = await fetch(`${SPOTIFY_ME_URL}?userId=${encodeURIComponent(userId)}`);
        if (!res.ok) {
          spotifyStatusEl.textContent = "Не подключен";
          return;
        }
        const data = await res.json();
        if (data?.ok && data?.me) {
          const name = data.me.display_name || data.me.id || "Подключен";
          spotifyStatusEl.textContent = `Подключен: ${name}`;
          return;
        }
        spotifyStatusEl.textContent = "Не подключен";
      } catch {
        spotifyStatusEl.textContent = "Не подключен";
      }
    }

    async function loadSpotifyLibrary(append = false) {
      if (!append) {
        spotifyOffset = 0;
        showLoading();
      }
      try {
        const url = `${SPOTIFY_LIBRARY_URL}?userId=${encodeURIComponent(userId)}&limit=${PAGE_SIZE}&offset=${spotifyOffset}`;
        const res = await fetch(url);
        if (res.status === 401) {
          openSpotifyLogin();
          showError("Подключите Spotify для просмотра треков");
          return;
        }
        if (!res.ok) throw new Error("Spotify library failed");
        const data = await res.json();
        const incoming = dedupeTracks((data.tracks || []).map(mapTrack));
        if (!append) {
          playlist = incoming;
        } else {
          playlist = dedupeTracks(playlist.concat(incoming));
        }
        displayResults(playlist);
        if (data.has_more) {
          spotifyOffset = data.next_offset || (spotifyOffset + PAGE_SIZE);
          loadMoreWrap.style.display = "block";
          loadMoreBtn.onclick = () => loadSpotifyLibrary(true);
        } else {
          loadMoreWrap.style.display = "none";
        }
      } catch (error) {
        console.error("Spotify library error:", error);
        showError("Не удалось загрузить треки Spotify");
      }
    }

    function showNotification(text) {
      if (tg?.showAlert) tg.showAlert(text);
      else alert(text);
    }

    function haptic(type) {
      if (!tg?.HapticFeedback) return;
      if (type === "success") tg.HapticFeedback.notificationOccurred("success");
      else if (type === "error") tg.HapticFeedback.notificationOccurred("error");
      else tg.HapticFeedback.impactOccurred("light");
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = String(text ?? "");
      return div.innerHTML;
    }

    renderRecentSearches();
    refreshSpotifyStatus();
    setTimeout(() => searchInput.focus(), 300);

    if (spotifyConnectBtn) {
      spotifyConnectBtn.onclick = () => openSpotifyLogin();
    }
    if (spotifyLibraryBtn) {
      spotifyLibraryBtn.onclick = () => loadSpotifyLibrary(false);
    }
    if (artistLoadMoreBtn) {
      artistLoadMoreBtn.onclick = () => {
        loadArtistMore();
      };
    }
  </script>
</body>
</html>
